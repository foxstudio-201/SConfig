name: Build & Release SConfig

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (x64)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Electron binary
        run: npx electron --version

      - name: Generate icons
        run: npm run generate:icons

      - name: Setup code signing certificate (optional)
        shell: pwsh
        env:
          CSC_BASE64: ${{ secrets.CSC_BASE64 }}
        run: |
          if ($env:CSC_BASE64) {
            New-Item -ItemType Directory -Path "certs" -Force | Out-Null
            $bytes = [Convert]::FromBase64String($env:CSC_BASE64)
            [IO.File]::WriteAllBytes("certs/code-signing.pfx", $bytes)
            Write-Host "Certificate restored from CSC_BASE64 secret"
          } else {
            Write-Host "CSC_BASE64 not set — building unsigned (normal for open source)"
          }

      - name: Build Vite
        run: npm run build

      - name: Build Windows installer
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          $certPath = "certs/code-signing.pfx"
          if (Test-Path $certPath) {
            $env:CSC_LINK = (Resolve-Path $certPath).Path
            Write-Host "Building with code signing"
          } else {
            Write-Host "Building without code signing"
          }
          npx electron-builder --win --x64 --publish never

      - name: List build output
        shell: pwsh
        run: Get-ChildItem -Path dist-electron -Recurse -File | Select-Object FullName, Length

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SConfig-Windows-${{ steps.version.outputs.VERSION }}
          path: dist-electron/*.exe
          if-no-files-found: error
          retention-days: 30

  build-linux:
    name: Build Linux (x64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xauth \
            xvfb \
            libgbm-dev \
            libasound2-dev \
            rpm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify Electron binary
        run: npx electron --version

      - name: Generate icons
        run: npm run generate:icons

      - name: Build Vite
        run: npm run build

      - name: Build Linux packages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --linux --x64 --publish never

      - name: List build output
        run: find dist-electron -type f | sort

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SConfig-Linux-${{ steps.version.outputs.VERSION }}
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
          if-no-files-found: error
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package.json
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$VERSION" != "$TAG" ]; then
            echo "::error::package.json version ($VERSION) must match tag v$TAG"
            exit 1
          fi
          echo "Version OK: $VERSION"

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: SConfig-Windows-${{ steps.version.outputs.VERSION }}
          path: release-files/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: SConfig-Linux-${{ steps.version.outputs.VERSION }}
          path: release-files/linux

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SConfig v${{ steps.version.outputs.VERSION }}
          body: |
            ## SConfig v${{ steps.version.outputs.VERSION }}

            Minecraft Server Plugin Configurator — Windows & Linux x64.

            ### Tải về

            | Nền tảng | File | Ghi chú |
            |----------|------|---------|
            | Windows | `SConfig Setup ${{ steps.version.outputs.VERSION }}.exe` | NSIS installer (khuyến nghị) |
            | Linux | `SConfig-${{ steps.version.outputs.VERSION }}.AppImage` | Chạy trực tiếp |
            | Linux | `sconfig_${{ steps.version.outputs.VERSION }}_amd64.deb` | Debian / Ubuntu |
            | Linux | `sconfig-${{ steps.version.outputs.VERSION }}.x86_64.rpm` | Fedora / RHEL |

            > **Windows:** 10/11 (64-bit). Bản chưa ký số có thể bị SmartScreen cảnh báo — **More info** → **Run anyway**.
            >
            > **Linux AppImage:** `chmod +x SConfig-*.AppImage && ./SConfig-*.AppImage`

            ### Website

            [SconfigWeb](https://github.com/foxstudio-201/SconfigWeb) · [Repo SConfig](https://github.com/foxstudio-201/SConfig)
          files: |
            release-files/windows/*.exe
            release-files/linux/*.AppImage
            release-files/linux/*.deb
            release-files/linux/*.rpm
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
